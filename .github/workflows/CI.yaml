name: Android CI

on:
  workflow_dispatch: # Can be run manually
  pull_request:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Use a Linux environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin" # Use a reliable OpenJDK distribution
          java-version: "17" # Jetpack Compose often requires newer Java versions

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./src/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./src/gradlew assembleDebug

      - name: Run Lint checks
        run: ./src/gradlew lintDebug

      - name: Run Unit Tests
        run: ./src/gradlew testDebugUnitTest # Or test your specific module if not app module
